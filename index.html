<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App | Elvis Wachira</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

  <div class="container">
    <div class="todo-wrapper">
      
      <!-- Header -->
      <div class="todo-header">
        <h1>📝 Task Manager</h1>
        <p>Organize your day, one task at a time</p>
      </div>

      <!-- Add Task Input -->
      <div class="todo-input-section">
        <input type="text" id="taskInput" placeholder="What needs to be done?" autocomplete="off">
        <button id="addBtn">
          <i class="fas fa-plus"></i> Add Task
        </button>
      </div>

      <!-- Filter Buttons -->
      <div class="todo-filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
      </div>

      <!-- Tasks List -->
      <div class="todo-list-container">
        <ul id="taskList" class="task-list">
          <!-- Tasks will be added here dynamically -->
        </ul>
      </div>

      <!-- Footer Stats -->
      <div class="todo-footer">
        <span id="taskCount">0 tasks left</span>
        <button id="clearCompletedBtn" class="clear-btn">Clear Completed</button>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
